{% extends "base.html" %}

{% block content %}

<h2>Review Leave Request</h2>

<table>
    <tr>
        <th>Employee</th>
        <td>{{ leave.employee_name }}</td>
    </tr>
    <tr>
        <th>Leave Type</th>
        <td>{{ leave.leave_type }}</td>
    </tr>
    <tr>
        <th>Start Date</th>
        <td>{{ leave.start_date }}</td>
    </tr>
    <tr>
        <th>End Date</th>
        <td>{{ leave.end_date }}</td>
    </tr>
    <tr>
        <th>Reason</th>
        <td>{{ leave.reason }}</td>
    </tr>
    <tr>
        <th>Status</th>
        <td>{{ leave.status }}</td>
    </tr>
</table>

<form method="post">
    Review Comment:<br>
    <textarea name="review_comment" rows="5" cols="50"></textarea>
    <br><br>

    <button type="submit" name="action" value="Approved">Approve</button>
    <button type="submit" name="action" value="Denied">Deny</button>
</form>

{% endblock %}
