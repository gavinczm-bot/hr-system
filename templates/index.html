{% extends "base.html" %}

{% block content %}
<a href="/add">Add Employee</a>

<table border="1" cellpadding="5">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Department</th>
        <th>Salary</th>
        <th>Action</th>
    </tr>

    {% for e in employees %}
    <tr>
        <td>{{ e.id }}</td>
        <td>{{ e.name }}</td>
        <td>{{ e.department }}</td>
        <td>{{ e.salary }}</td>
        <td>
            <a href="/edit/{{ e.id }}">Edit</a>
            <a href="/delete/{{ e.id }}">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
